<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weave Fabric — Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --surface-3: #22222e;
    --border: rgba(255,255,255,0.06);
    --text: #e4e4e7;
    --text-dim: #71717a;
    --text-muted: #52525b;
    --accent: #EF3B3B;
    --accent-dim: rgba(239,59,59,0.15);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.12);
    --yellow: #eab308;
    --yellow-dim: rgba(234,179,8,0.12);
    --blue: #3b82f6;
    --blue-dim: rgba(59,130,246,0.12);
    --font: 'Inter', -apple-system, sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .dashboard { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: white;
  }
  .header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
  .header-subtitle { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .live-dot {
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
  }
  .live-label { font-size: 13px; color: var(--green); font-weight: 500; }
  .refresh-info { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }

  /* Stats Row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 6px; }
  .stat-value { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .stat-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* Grid layout */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
  }
  @media (max-width: 960px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .panel-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--accent-dim);
    color: var(--accent);
  }
  .panel-body { padding: 12px; max-height: 600px; overflow-y: auto; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 2px; }

  /* Commit Feed */
  .commit {
    display: flex;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 8px;
    transition: background 0.15s;
    position: relative;
  }
  .commit:hover { background: var(--surface-2); }
  .commit-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .commit-line {
    position: absolute;
    left: 12.5px;
    top: 20px;
    bottom: -6px;
    width: 1px;
    background: var(--border);
  }
  .commit:last-child .commit-line { display: none; }
  .commit-content { flex: 1; min-width: 0; }
  .commit-msg {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 4px;
    word-break: break-word;
  }
  .commit-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }
  .commit-hash { color: var(--text-dim); }
  .commit-agent {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 99px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .commit-time { color: var(--text-muted); }
  .commit-new {
    animation: fadeIn 0.5s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Agent Cards */
  .agents-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .agent-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .agent-card:hover { background: var(--surface-2); }
  .agent-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .agent-name { font-size: 13px; font-weight: 600; flex: 1; }
  .agent-count {
    font-size: 12px;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text-dim);
  }

  /* Backlog Progress */
  .backlog-section {
    margin-bottom: 16px;
    padding: 12px;
    background: var(--surface-2);
    border-radius: 10px;
  }
  .backlog-section:last-child { margin-bottom: 0; }
  .backlog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .backlog-title { font-size: 13px; font-weight: 700; }
  .backlog-count { font-size: 12px; font-family: var(--mono); color: var(--text-dim); }
  .backlog-bar {
    height: 6px;
    background: var(--surface-3);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .backlog-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .backlog-items { display: flex; flex-direction: column; gap: 4px; }
  .backlog-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    padding: 4px 0;
  }
  .backlog-check {
    width: 16px; height: 16px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 10px;
  }
  .backlog-check--done { background: var(--green-dim); color: var(--green); }
  .backlog-check--pending { background: var(--surface-3); color: var(--text-muted); }
  .backlog-item-name { color: var(--text-dim); }
  .backlog-item--done .backlog-item-name { color: var(--green); text-decoration: line-through; text-decoration-color: rgba(34,197,94,0.3); }

  /* Branch info */
  .branch-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--mono);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 6px;
    color: var(--text-dim);
  }
  .branch-icon { color: var(--accent); }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--surface-3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-muted); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* Bottom row */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }
  @media (max-width: 960px) {
    .bottom-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="dashboard" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Loading agent dashboard...</div>
  </div>
</div>

<script>
const REFRESH_INTERVAL = 30_000; // 30 seconds
let lastData = null;
let lastCommitCount = 0;

function timeAgo(dateStr) {
  const now = new Date();
  const then = new Date(dateStr);
  const seconds = Math.floor((now - then) / 1000);
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function formatTime(dateStr) {
  return new Date(dateStr).toLocaleTimeString('en-US', {
    hour: '2-digit', minute: '2-digit', hour12: true
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function render(data) {
  const isNewData = lastCommitCount > 0 && data.commits.length > lastCommitCount;
  const newCount = isNewData ? data.commits.length - lastCommitCount : 0;
  lastCommitCount = data.commits.length;

  const agents = Object.entries(data.agentActivity || {})
    .sort((a, b) => b[1].count - a[1].count);

  const totalBacklogItems = data.backlog.reduce((sum, s) => sum + s.items.length, 0);
  const completedBacklogItems = data.backlog.reduce((sum, s) => sum + s.items.filter(i => i.completed).length, 0);
  const overallProgress = totalBacklogItems > 0 ? Math.round((completedBacklogItems / totalBacklogItems) * 100) : 0;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="logo">W</div>
        <div>
          <div class="header-title">Agent Dashboard</div>
          <div class="header-subtitle">Weave Fabric Forms — Autonomous Development</div>
        </div>
      </div>
      <div class="header-right">
        <span class="branch-tag"><span class="branch-icon">⎇</span> ${escapeHtml(data.branch.current)}</span>
        <div class="live-dot"></div>
        <span class="live-label">Live</span>
        <span class="refresh-info">↻ ${formatTime(data.generatedAt)}</span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Commits</div>
        <div class="stat-value">${data.stats.totalCommits}</div>
        <div class="stat-sub">across all branches</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value">${data.stats.commitsToday}</div>
        <div class="stat-sub">commits today</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Hour</div>
        <div class="stat-value">${data.stats.commitsLastHour}</div>
        <div class="stat-sub">commits in the last 60 min</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Backlog Progress</div>
        <div class="stat-value">${overallProgress}%</div>
        <div class="stat-sub">${completedBacklogItems} of ${totalBacklogItems} items done</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active Agents</div>
        <div class="stat-value">${agents.length}</div>
        <div class="stat-sub">categories detected</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Commit Feed</span>
          <span class="panel-badge">${data.commits.length} commits</span>
        </div>
        <div class="panel-body">
          ${data.commits.length === 0
            ? '<div class="empty-state">No commits yet. Start a loop to see activity here.</div>'
            : data.commits.slice(0, 50).map((c, i) => `
              <div class="commit ${i < newCount ? 'commit-new' : ''}">
                <div class="commit-dot" style="background:${c.color}"></div>
                <div class="commit-line"></div>
                <div class="commit-content">
                  <div class="commit-msg">${escapeHtml(c.message)}</div>
                  <div class="commit-meta">
                    <span class="commit-hash">${c.short}</span>
                    <span class="commit-agent" style="background:${c.color}22;color:${c.color}">${escapeHtml(c.agent)}</span>
                    <span class="commit-time">${timeAgo(c.date)}</span>
                  </div>
                </div>
              </div>
            `).join('')
          }
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:20px">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Agent Activity</span>
          </div>
          <div class="panel-body">
            <div class="agents-grid">
              ${agents.map(([name, info]) => `
                <div class="agent-card">
                  <div class="agent-dot" style="background:${info.color}"></div>
                  <span class="agent-name">${escapeHtml(name)}</span>
                  <span class="agent-count">${info.count}</span>
                </div>
              `).join('')}
              ${agents.length === 0 ? '<div class="empty-state">No agent activity yet.</div>' : ''}
            </div>
          </div>
        </div>

        <div class="panel" style="flex:1">
          <div class="panel-header">
            <span class="panel-title">Backlog Progress</span>
            <span class="panel-badge">${overallProgress}%</span>
          </div>
          <div class="panel-body">
            ${data.backlog.map(section => {
              const done = section.items.filter(i => i.completed).length;
              const total = section.items.length;
              const pct = total > 0 ? Math.round((done / total) * 100) : 0;
              const colors = ['#EF3B3B', '#3b82f6', '#a78bfa', '#eab308'];
              const barColor = colors[(section.number - 1) % colors.length];
              return `
                <div class="backlog-section">
                  <div class="backlog-header">
                    <span class="backlog-title">S${section.number}: ${escapeHtml(section.title)}</span>
                    <span class="backlog-count">${done}/${total}</span>
                  </div>
                  <div class="backlog-bar">
                    <div class="backlog-bar-fill" style="width:${pct}%;background:${barColor}"></div>
                  </div>
                  <div class="backlog-items">
                    ${section.items.map(item => `
                      <div class="backlog-item ${item.completed ? 'backlog-item--done' : ''}">
                        <div class="backlog-check ${item.completed ? 'backlog-check--done' : 'backlog-check--pending'}">
                          ${item.completed ? '✓' : '·'}
                        </div>
                        <span class="backlog-item-name">${escapeHtml(item.name)}</span>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `;
            }).join('')}
            ${data.backlog.length === 0 ? '<div class="empty-state">No backlog data found.</div>' : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

async function fetchData() {
  try {
    const res = await fetch('/dashboard-data.json?t=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    lastData = data;
    render(data);
  } catch (err) {
    if (lastData) {
      render(lastData); // keep showing last good data
    } else {
      document.getElementById('app').innerHTML = `
        <div class="loading">
          <div class="empty-state">
            <p style="font-size:16px;margin-bottom:8px">Dashboard data not found</p>
            <p>Run <code style="background:var(--surface-2);padding:2px 8px;border-radius:4px;font-family:var(--mono)">npm run dashboard</code> to generate it</p>
          </div>
        </div>
      `;
    }
  }
}

// Initial fetch + auto-refresh
fetchData();
setInterval(fetchData, REFRESH_INTERVAL);

// Update title with activity indicator
let tick = 0;
setInterval(() => {
  tick++;
  const dot = tick % 2 === 0 ? '●' : '○';
  document.title = `${dot} Agent Dashboard — Weave Fabric`;
}, 5000);
</script>
</body>
</html>
